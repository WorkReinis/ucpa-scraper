name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ucpa-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Restore scraper database
        shell: bash
        run: |
          git fetch origin data
          git show origin/data:ucpa.db > ucpa.db
          test -s ucpa.db

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix web

      - name: Export and verify static catalogue
        run: |
          npm run export:static
          npm run verify:static

      - name: Test and lint
        run: |
          npm test
          npm run lint --prefix web

      - name: Build hosted app
        run: npm run build --prefix web
        env:
          VITE_STATIC_DATA: "1"
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Job summary
        shell: bash
        run: |
          echo "## UCPA Pages deployment" >> "$GITHUB_STEP_SUMMARY"
          jq -r '"- Products: \(.products)\n- Listings: \(.listings)\n- Last scrape: \(.lastScrapedAt)\n- Flight quota: apify \(.flightQuota.apify.used)/\(.flightQuota.apify.limit // "unlimited"), serpapi \(.flightQuota.serpapi.used)/\(.flightQuota.serpapi.limit)"' .refresh-summary.json >> "$GITHUB_STEP_SUMMARY"
          echo "- Site: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
