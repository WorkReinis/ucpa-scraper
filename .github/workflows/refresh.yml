name: Refresh UCPA catalogue

on:
  schedule:
    - cron: "15 7 * * *"
      timezone: Europe/Riga
  workflow_dispatch:
    inputs:
      operation:
        description: What should run?
        required: true
        default: both
        type: choice
        options:
          - both
          - catalogue
          - flights
          - dry-run

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ucpa-pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # A cold flight refresh is ~105 actor runs; the 14-day return cache reduces
    # normal fare-only cycles to ~70 before any exact-cell recovery searches.
    timeout-minutes: 180
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      OPERATION: ${{ github.event_name == 'schedule' && 'both' || inputs.operation }}
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      APIFY_KEY_1: ${{ secrets.APIFY_KEY_1 }}
      APIFY_KEY_2: ${{ secrets.APIFY_KEY_2 }}
      APIFY_KEY_3: ${{ secrets.APIFY_KEY_3 }}
      APIFY_KEY_4: ${{ secrets.APIFY_KEY_4 }}
      SCRAPE_DIAGNOSTICS_DIR: .scrape-diagnostics
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Restore scraper database
        shell: bash
        run: |
          if ! git fetch origin data; then
            echo "::error::The data branch is missing. Run npm run data:init once from the computer holding ucpa.db."
            exit 1
          fi
          git show origin/data:ucpa.db > ucpa.db
          test -s ucpa.db

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix web

      - name: Catalogue dry run
        if: env.OPERATION == 'dry-run'
        run: npm run dry -- --strict

      - name: Refresh catalogue
        if: env.OPERATION == 'catalogue' || env.OPERATION == 'both'
        run: npm run scrape -- --strict

      - name: Refresh flights when six-day quotes are due
        id: flights
        if: env.OPERATION == 'flights' || env.OPERATION == 'both'
        continue-on-error: true
        shell: bash
        run: |
          if test -z "$APIFY_KEY_1$APIFY_KEY_2$APIFY_KEY_3$APIFY_KEY_4$SERPAPI_KEY"; then
            echo "::warning title=Flights skipped::No flight provider configured (APIFY_KEY_1..4 or SERPAPI_KEY) in repository Actions secrets. Catalogue data will still be refreshed."
            echo "status=skipped (no provider configured)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set +e
          npm run flights
          flight_exit=$?
          set -e
          if test -f .flight-summary.json; then
            flight_status="$(jq -r '.status // "failed"' .flight-summary.json)"
            echo "status=$flight_status" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed (no flight summary produced)" >> "$GITHUB_OUTPUT"
          fi
          if test "$flight_exit" -ne 0; then
            echo "::warning title=Flight refresh incomplete::The catalogue will still deploy, but existing flight quotes remain in use for missing cells."
          fi
          exit "$flight_exit"

      - name: Stop after dry run
        if: env.OPERATION == 'dry-run'
        run: |
          echo "## UCPA dry run" >> "$GITHUB_STEP_SUMMARY"
          echo "No database or deployment was changed." >> "$GITHUB_STEP_SUMMARY"

      - name: Export and verify static catalogue
        if: env.OPERATION != 'dry-run'
        run: |
          npm run export:static
          npm run verify:static
          npm run validate:airports

      - name: Test and lint
        if: env.OPERATION != 'dry-run'
        run: |
          npm test
          npm run lint --prefix web

      - name: Build hosted app
        if: env.OPERATION != 'dry-run'
        run: npm run build --prefix web
        env:
          VITE_STATIC_DATA: "1"
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v6
        if: env.OPERATION != 'dry-run'
      - uses: actions/upload-pages-artifact@v5
        if: env.OPERATION != 'dry-run'
        with:
          path: web/dist
      - name: Deploy
        id: deployment
        if: env.OPERATION != 'dry-run'
        uses: actions/deploy-pages@v5

      - name: Checkpoint successful database
        if: env.OPERATION != 'dry-run' && steps.deployment.outcome == 'success'
        run: node src/checkpoint-db.mjs ucpa.db

      - name: Back up successful database
        if: env.OPERATION != 'dry-run' && steps.deployment.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: ucpa-db-${{ github.run_id }}
          path: ucpa.db
          retention-days: 14
          if-no-files-found: error

      - name: Upload scrape diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scrape-diagnostics-${{ github.run_id }}
          path: |
            .scrape-diagnostics/
            .scrape-summary.json
            .flight-summary.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Publish rolling data branch
        if: env.OPERATION != 'dry-run' && steps.deployment.outcome == 'success'
        shell: bash
        run: |
          cp ucpa.db /tmp/ucpa.db
          git switch --orphan data-publish
          git rm -rf --ignore-unmatch .
          cp /tmp/ucpa.db ucpa.db
          git add -f ucpa.db
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "refresh scraper database"
          git push --force origin HEAD:data

      - name: Job summary
        if: always() && env.OPERATION != 'dry-run'
        shell: bash
        run: |
          echo "## UCPA scheduled refresh" >> "$GITHUB_STEP_SUMMARY"
          if test -f .scrape-summary.json; then
            jq -r '"- Catalogue: \(if .error then "failed - " + .error else "passed" end)\n- Products: \(.products // 0)\n- Source failures: \(.sourceFailures // [] | length)\n- Detail warnings: \(.detailFailures // [] | length)"' .scrape-summary.json >> "$GITHUB_STEP_SUMMARY"
          fi
          if test -f .refresh-summary.json; then
            jq -r '"- Listings: \(.listings)\n- Last scrape: \(.lastScrapedAt)\n- Last flight check: \(.lastFlightsRefreshAt)\n- Flight quota: apify \(.flightQuota.apify.used)/\(.flightQuota.apify.limit), serpapi \(.flightQuota.serpapi.used)/\(.flightQuota.serpapi.limit)\n- Unknown category groups: \(.unknownCategoryGroups)"' .refresh-summary.json >> "$GITHUB_STEP_SUMMARY"
          fi
          if test -f .flight-summary.json; then
            jq -r '"- Flight refresh: \(.status // "failed")\n- Flight modes: \(.modesCompleted // 0)/\(.modesDue // 0) completed\n- Flight cells: \(.cellsStored // 0)/\(.cellsDue // 0) stored (\(.cellsUnpriced // 0) searched with no viable price, \(.unresolvedCells // 0) unresolved)\n- Provider searches: \(.searched // 0) total, \(.broadSearches // 0) broad, \(.targetedRetries // 0) targeted retries\n- Return cache: \(.returnCacheHits // 0) date-pair hits, \(.returnCellsReused // 0) cells reused\n- Failures: \(.failed // 0)"' .flight-summary.json >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Flight step: ${{ steps.flights.outputs.status || steps.flights.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if test -n "${{ steps.deployment.outputs.page_url }}"; then echo "- Site: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"; fi
